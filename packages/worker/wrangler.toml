name = "all-things-ai-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
    "*/30 * * * *",
    "0 */2 * * *",
    "0 */3 * * *",
    "0 6 * * *",
    "0 7 * * *",
    "0 8 * * 1",
    "0 8 * * 4",
    "0 */6 * * *",
    "15 */4 * * *"
]

[[d1_databases]]
binding = "DB"
database_name = "all-things-ai-db"
database_id = "f3f12b72-ab5a-4808-a749-f683f19dd9ea"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "f7a280ca8f2347c8b5bcdb02b5ed6161"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "9a46e26a816f4fc09a7181ea4be8b387"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
# ADMIN_API_KEY is set via `wrangler secret put ADMIN_API_KEY` — not in this file
